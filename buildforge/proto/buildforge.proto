syntax = "proto3";

package buildforge;

option cc_enable_arenas = true;

service Coordinator {
  rpc RegisterWorker   (WorkerInfo)      returns (RegistrationAck);
  rpc Heartbeat        (HeartbeatRequest) returns (HeartbeatResponse);
  rpc GetTask          (TaskRequest)     returns (TaskAssignment);
  rpc ReportResult     (TaskResult)      returns (Ack);
  rpc StreamBuildLog   (stream LogEntry) returns (Ack);
}

service BuildForge {
  rpc SubmitBuild  (BuildRequest)  returns (BuildId);
  rpc BuildStatus  (BuildId)       returns (stream BuildEvent);
  rpc CancelBuild  (BuildId)       returns (Ack);
}

message WorkerInfo {
  string worker_id = 1;
  int32 capacity = 2;
  repeated string tags = 3;
}

message RegistrationAck {
  bool accepted = 1;
  string message = 2;
}

message HeartbeatRequest {
  string worker_id = 1;
  int32 active_tasks_count = 2;
  double cpu_usage = 3;
  double memory_usage_bytes = 4;
}

message HeartbeatResponse {
  bool should_terminate = 1;
  repeated string cancel_task_ids = 2;
}

message TaskRequest {
  string worker_id = 1;
  repeated string cached_artifact_ids = 2;
}

message TaskAssignment {
  string task_id = 1;
  string target_name = 2;
  string rule_type = 3;
  repeated string cmd_args = 4;
  repeated string input_artifact_ids = 5;
  int32 timeout_seconds = 6;
}

message TaskResult {
  string task_id = 1;
  string worker_id = 2;
  int32 exit_code = 3;
  string failure_reason = 4;
  repeated string output_artifact_ids = 5;
  int64 duration_ms = 6;
}

message LogEntry {
  string build_id = 1;
  string task_id = 2;
  string line = 3;
  int64 timestamp_ms = 4;
  string stream_type = 5; // stdout or stderr
}

message BuildRequest {
  string target_label = 1; // e.g. "//app:main"
  int32 priority = 2;
  bool bypass_cache = 3;
  string config_type = 4; // debug vs release
  string trace_id = 5;    // Distributed trace UUID v4
}

message BuildId {
  string build_id = 1;
}

enum BuildStatusState {
  QUEUED = 0;
  RUNNING = 1;
  SUCCEEDED = 2;
  FAILED = 3;
  CANCELLED = 4;
}

message BuildEvent {
  string build_id = 1;
  BuildStatusState state = 2;
  int32 targets_completed = 3;
  int32 total_targets = 4;
  string log_message = 5;
  int64 timestamp_ms = 6;
}

message Ack {
  bool success = 1;
  string message = 2;
}
